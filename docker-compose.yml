services:
  orchestrator:
    build: .
    container_name: secure-pipe-orchestrator-1
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/securepipe.db

